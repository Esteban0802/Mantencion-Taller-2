<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Órdenes</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">⚙️ Mantención</h2>

    <ul>
      <li onclick="irDashboard()">📊 Dashboard</li>
      <li onclick="nuevaOT()">➕ Nueva OT</li>
      <li onclick="irDashboard()">📁 Órdenes</li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

    <div class="header">
      <h2>Órdenes de Trabajo</h2>
    </div>

    <div class="buscador">
  <input 
    type="text" 
    id="inputBuscar" 
    placeholder="🔍 Buscar por OT, equipo o serie..."
    onkeyup="filtrarOTs()"
  >
</div>

      <!-- 🔥 KPI AQUÍ -->
 <div class="kpis">

  <div class="kpi-card total">
    <div class="kpi-icon">📊</div>
    <div>
      <span>Total OT</span>
      <h3 id="kpiTotal">0</h3>
    </div>
  </div>

  <div class="kpi-card proceso">
    <div class="kpi-icon">⚙️</div>
    <div>
      <span>En Proceso</span>
      <h3 id="kpiProceso">0</h3>
    </div>
  </div>

  <div class="kpi-card cerradas">
    <div class="kpi-icon">✅</div>
    <div>
      <span>Cerradas</span>
      <h3 id="kpiCerradas">0</h3>
    </div>
  </div>

</div>
    

    <div class="card">
      <table class="tabla-ot">
        <thead>
          <tr>
            <th>Orden</th>
            <th>Equipo</th>
            <th>Serie</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaOT"></tbody>
      </table>
    </div>

  </main>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
