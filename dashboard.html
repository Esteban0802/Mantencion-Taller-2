<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Órdenes</title>
  <link rel="icon" type="image/png" href="img/logo_overtrack - pestaña.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo_overtrack.png" alt="OverTrack">
    </div>

    <ul>
      <li onclick="irDashboard()">📊 Dashboard</li>
      <li onclick="nuevaOT()">➕ Nueva OT</li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

  <div class="header">

  <h2>Órdenes de Trabajo</h2>

  <div class="header-right">

    <div class="user-box">
      <span id="usuarioNombre">Usuario</span>
      <small id="usuarioRol">Rol</small>

      <button
        onclick="cerrarSesion()"
        class="btn-logout permitido-bloqueo"
      >
        Salir
      </button>
    </div>

  </div>

</div>

    <div class="buscador">
  <input 
    type="text" 
    id="inputBuscar" 
    placeholder="🔍 Buscar por OT, equipo o serie..."
    onkeyup="filtrarOTs()"
  >
</div>

      <!-- 🔥 KPI AQUÍ -->
 <div class="kpis">

  <div class="kpi-card total">
    <div class="kpi-icon">📊</div>
    <div>
      <span>Total OT</span>
      <h3 id="kpiTotal">0</h3>
    </div>
  </div>

  <div class="kpi-card proceso">
    <div class="kpi-icon">⚙️</div>
    <div>
      <span>En Proceso</span>
      <h3 id="kpiProceso">0</h3>
    </div>
  </div>

  <div class="kpi-card cerradas">
    <div class="kpi-icon">✅</div>
    <div>
      <span>Cerradas</span>
      <h3 id="kpiCerradas">0</h3>
    </div>
  </div>

</div>

 

    <div class="card">
      <table class="tabla-ot">
        <thead>
          <tr>
            <th>Orden</th>
            <th>Equipo</th>
            <th>Serie</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaOT"></tbody>
      </table>
    </div>

    <div class="charts">

  <div class="chart-card">
    <h3>Estado de Órdenes</h3>
    <canvas id="graficoEstados"></canvas>
  </div>

  <div class="chart-card">
    <h3>Progreso Global</h3>
    <canvas id="graficoProgreso"></canvas>
  </div>

</div>

  </main>

  <div id="modalAlertasJefe" class="modal-alertas">

  <div class="modal-alertas-content">

    <div class="modal-alertas-header">
      <h2>Comentarios del Jefe de Taller</h2>

      <button
        class="btn-danger"
        onclick="cerrarModalAlertas()"
      >
        Cerrar
      </button>
    </div>

    <div id="listaAlertasJefe"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/dashboard.js"></script>
</body>
</html>
