<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OverTrack | Login</title>
  <link rel="icon" type="image/png" href="/img/logo_overtrack - pestaña.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-overtrack">

  <div class="login-bg-grid"></div>

  <main class="login-wrapper">

    <section class="login-brand">
      <div class="brand-logo">
        <img src="./img/logo_overtrack.png" alt="OverTrack">
        </div>
      <p>Gestión, trazabilidad y control operacional de taller.</p>
    </section>

    <section class="login-panel">
      <h2>Acceso al sistema</h2>
      <p class="login-subtitle">Ingresa con tu cuenta de taller</p>

      <label>Correo</label>
      <input type="email" id="email" placeholder="usuario@empresa.cl">

      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••">

      <button id="btnLogin" class="btn-login">
        Iniciar sesión →
      </button>

      <p id="loginError" class="login-error"></p>
    </section>

  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
